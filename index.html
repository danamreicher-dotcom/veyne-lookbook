<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VEYNE — The Collection</title>
<meta name="description" content="VEYNE — Premium press-on nails, Soft Gel. The full Spring 2026 collection.">
<meta property="og:title" content="VEYNE — The Collection">
<meta property="og:description" content="Premium press-on nails · Soft Gel. 10 styles, launching soon.">
<meta property="og:image" content="https://cdn.shopify.com/s/files/1/0979/6186/9679/files/c-blush.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  *,*::before,*::after{box-sizing:border-box}
  @keyframes veyneFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes veyneGloss{0%{background-position:165% 0;opacity:0}9%{opacity:.9}32%{opacity:0}100%{background-position:-65% 0;opacity:0}}
  @keyframes veyneShadowPulse{0%,100%{transform:translate(-50%,0) scale(1);opacity:.34}50%{transform:translate(-50%,0) scale(1.05);opacity:.28}}

  .stage-wrap{position:relative;width:100%;min-height:100vh;display:flex;flex-direction:column;
    align-items:center;font-family:'Jost',sans-serif;color:#3a342c;overflow:hidden;
    background:linear-gradient(180deg,#f9f0dd 0%,#f5ead4 46%,#efe1c7 74%,#e7d6ba 100%)}
  .glow{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(80% 50% at 50% 24%,rgba(255,252,244,.85) 0%,rgba(255,252,244,0) 60%)}

  header.vh{position:relative;z-index:5;width:100%;display:flex;flex-direction:column;align-items:center;
    padding:36px 24px 4px;flex:none}
  .brand{font-family:'Jost',sans-serif;font-weight:600;font-size:clamp(26px,4vw,40px);
    letter-spacing:.42em;color:#b67a80;padding-left:.42em}
  .brandsub{margin-top:10px;font-size:clamp(9px,1.4vw,11px);letter-spacing:.34em;text-transform:uppercase;
    color:#a99b86;font-weight:400}

  .deck{position:relative;z-index:2;width:100%;flex:1;min-height:clamp(400px,56vh,580px);
    display:flex;align-items:center;justify-content:center;perspective:1050px;perspective-origin:50% 42%}
  .floorglow{position:absolute;left:50%;top:50%;transform:translate(-50%,clamp(132px,25vw,196px));
    width:clamp(220px,42vw,360px);height:clamp(60px,9vw,84px);
    background:radial-gradient(60% 60% at 50% 50%,rgba(255,250,240,.9) 0%,rgba(255,250,240,0) 70%);
    filter:blur(8px);pointer-events:none;z-index:1}
  .floorshadow{position:absolute;left:50%;top:50%;transform:translate(-50%,clamp(150px,27vw,212px));
    width:clamp(150px,28vw,236px);height:clamp(26px,4vw,38px);border-radius:50%;
    background:radial-gradient(closest-side,rgba(120,92,66,.42) 0%,rgba(120,92,66,.18) 52%,rgba(120,92,66,0) 78%);
    filter:blur(7px);pointer-events:none;z-index:1;animation:veyneShadowPulse 4s ease-in-out infinite}

  .nav{position:absolute;top:46%;z-index:200;width:clamp(44px,5vw,56px);height:clamp(44px,5vw,56px);
    border-radius:50%;border:1px solid rgba(122,108,92,.26);background:rgba(255,251,243,.55);
    backdrop-filter:blur(6px);color:#6f6456;font-size:18px;cursor:pointer;display:flex;align-items:center;
    justify-content:center;transition:all .25s ease}
  .nav:hover{background:#fffaf0;border-color:rgba(122,108,92,.5);color:#3a342c}
  .nav.prev{left:clamp(10px,4vw,56px)} .nav.next{right:clamp(10px,4vw,56px)}

  .track{position:relative;width:clamp(212px,38vw,316px);height:clamp(272px,50vw,408px);transform-style:preserve-3d}
  .card{position:absolute;left:50%;top:50%;width:100%;height:100%;will-change:transform,opacity;
    transition:transform .9s cubic-bezier(.22,.61,.36,1),opacity .9s cubic-bezier(.22,.61,.36,1),filter .9s ease}
  .card .inner{position:relative;width:100%;height:100%;background-size:contain;
    background-position:center bottom;background-repeat:no-repeat;
    -webkit-box-reflect:below 6px linear-gradient(to bottom,transparent 58%,rgba(255,255,255,.20) 100%)}
  .card.front .inner{animation:veyneFloat 5s ease-in-out infinite}
  .card .sheen{position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(105deg,rgba(255,255,255,0) 40%,rgba(255,255,255,.6) 50%,rgba(255,255,255,0) 60%);
    background-size:260% 100%;background-repeat:no-repeat;mix-blend-mode:overlay;opacity:0;
    -webkit-mask-size:contain;mask-size:contain;-webkit-mask-position:center bottom;mask-position:center bottom;
    -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat}
  .card.front .sheen{animation:veyneGloss 5.5s ease-in-out .5s infinite}

  .info{position:relative;z-index:5;width:100%;max-width:560px;display:flex;flex-direction:column;
    align-items:center;text-align:center;padding:6px 24px 44px;flex:none}
  .idx{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:#b67a80;font-weight:500;margin-bottom:7px}
  .name{margin:0;font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(34px,6vw,54px);
    line-height:1;color:#39322a;letter-spacing:.01em}
  .meta{margin-top:12px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8d8170;font-weight:400}
  .dots{display:flex;gap:8px;margin-top:24px;align-items:center}
  .dot{height:8px;width:8px;border-radius:8px;border:none;padding:0;cursor:pointer;
    background:rgba(122,108,92,.28);transition:all .4s cubic-bezier(.22,.61,.36,1)}
  .dot.on{width:26px;background:#b67a80}
  .cta{margin-top:28px;font-family:'Jost',sans-serif;font-weight:500;font-size:11px;letter-spacing:.2em;
    text-transform:uppercase;color:#f6efe1;background:#2d2823;border:none;padding:15px 34px;border-radius:40px;
    cursor:pointer;transition:all .25s ease;text-decoration:none;display:inline-block}
  .cta:hover{background:#b67a80}
</style>
</head>
<body>
<div class="stage-wrap">
  <div class="glow"></div>

  <header class="vh">
    <div class="brand">VEYNE</div>
    <div class="brandsub">Premium Press-On Nails · Soft Gel</div>
  </header>

  <div class="deck" id="deck">
    <div class="floorglow"></div>
    <div class="floorshadow"></div>
    <button class="nav prev" id="prev" aria-label="Previous">&#8249;</button>
    <button class="nav next" id="next" aria-label="Next">&#8250;</button>
    <div class="track" id="track"></div>
  </div>

  <div class="info">
    <div class="idx" id="idx">01 / 10</div>
    <h1 class="name" id="name">Blush</h1>
    <div class="meta" id="meta">Almond · Short · Nude-Pink French</div>
    <div class="dots" id="dots"></div>
    <a class="cta" href="https://instagram.com/weareveyne" target="_blank" rel="noopener">Launching Soon</a>
  </div>
</div>

<script>
  const CDN='img4/';
  const products=[
    {img:'blush.png',     name:'Blush',     shape:'Almond', finish:'Nude-Pink French'},
    {img:'veil.png',      name:'Veil',      shape:'Almond', finish:'Milky White'},
    {img:'ivory.png',     name:'Ivory',     shape:'Square', finish:'Milky White'},
    {img:'caramel.png',   name:'Caramel',   shape:'Almond', finish:'Warm Nude'},
    {img:'blanc.png',     name:'Blanc',     shape:'Square', finish:'White French'},
    {img:'champagne.png', name:'Champagne', shape:'Almond', finish:'Champagne Pearl'},
    {img:'rose.png',      name:'Rosé',      shape:'Square', finish:'Pink Pearl'},
    {img:'amour.png',     name:'Amour',     shape:'Almond', finish:'Nude · Red Hearts'},
    {img:'claret.png',    name:'Claret',    shape:'Almond', finish:'Deep Burgundy'},
    {img:'garnet.png',    name:'Garnet',    shape:'Square', finish:'Deep Wine'},
  ];
  const n=products.length, half=n/2;
  let current=0, paused=false, timer=null;

  function layout(off){
    const sign=Math.sign(off), a=Math.abs(off);
    if(a===0) return {tx:0,        tz:90,   ry:0,        sc:1,   op:1,   z:100, blur:0};
    if(a===1) return {tx:56*sign,  tz:-110, ry:-52*sign, sc:.84, op:1,   z:90,  blur:0};
    if(a===2) return {tx:99*sign,  tz:-340, ry:-56*sign, sc:.66, op:.62, z:80,  blur:1.2};
    return        {tx:128*sign, tz:-560, ry:-58*sign, sc:.54, op:0,   z:10,  blur:3};
  }

  // build cards once
  const track=document.getElementById('track');
  const cards=products.map((p,i)=>{
    const c=document.createElement('div'); c.className='card';
    const inner=document.createElement('div'); inner.className='inner';
    inner.style.backgroundImage=`url("${CDN}${p.img}")`;
    const sheen=document.createElement('div'); sheen.className='sheen';
    sheen.style.webkitMaskImage=`url("${CDN}${p.img}")`;
    sheen.style.maskImage=`url("${CDN}${p.img}")`;
    inner.appendChild(sheen); c.appendChild(inner);
    c.addEventListener('click',()=>{ if(i!==current) goTo(i); });
    track.appendChild(c); return c;
  });

  // dots
  const dotsWrap=document.getElementById('dots');
  const dots=products.map((p,i)=>{
    const b=document.createElement('button'); b.className='dot'; b.setAttribute('aria-label','Go to '+p.name);
    b.addEventListener('click',()=>goTo(i)); dotsWrap.appendChild(b); return b;
  });

  function render(){
    products.forEach((p,i)=>{
      let off=i-current; if(off>half) off-=n; if(off<-half) off+=n;
      const L=layout(off), front=off===0, c=cards[i];
      c.style.transform=`translate(-50%,-50%) translateX(${L.tx}%) translateZ(${L.tz}px) rotateY(${L.ry}deg) scale(${L.sc})`;
      c.style.opacity=L.op;
      c.style.zIndex=L.z;
      c.style.filter=front
        ? 'drop-shadow(0 38px 34px rgba(120,86,58,.34))'
        : `drop-shadow(0 22px 26px rgba(120,86,58,.24))${L.blur?` blur(${L.blur}px)`:''}`;
      c.style.pointerEvents=L.op===0?'none':'auto';
      c.style.cursor=front?'default':'pointer';
      c.classList.toggle('front',front);
      dots[i].classList.toggle('on',front);
    });
    const p=products[current];
    document.getElementById('name').textContent=p.name;
    document.getElementById('meta').textContent=`${p.shape} · Short · ${p.finish}`;
    document.getElementById('idx').textContent=`${String(current+1).padStart(2,'0')} / ${String(n).padStart(2,'0')}`;
  }
  function next(){ current=(current+1)%n; render(); }
  function prev(){ current=(current-1+n)%n; render(); }
  function goTo(i){ current=i; render(); }

  document.getElementById('next').addEventListener('click',next);
  document.getElementById('prev').addEventListener('click',prev);
  const deck=document.getElementById('deck');
  deck.addEventListener('mouseenter',()=>paused=true);
  deck.addEventListener('mouseleave',()=>paused=false);
  timer=setInterval(()=>{ if(!paused) next(); },3800);

  render();
</script>
</body>
</html>
